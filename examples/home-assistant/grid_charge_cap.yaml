# grid_charge_cap.yaml — HA package for Energy Dashboard cap enforcement
#
# Drop this entire file into your HA config dir at:
#   <your-ha-config>/packages/grid_charge_cap.yaml
#
# Then enable packages in configuration.yaml (one-time):
#   homeassistant:
#     packages: !include_dir_named packages
#
# Restart HA. The REST sensor + automation will register automatically.
#
# ====== EDIT THESE THREE THINGS ======
# 1. REST resource URL — point at YOUR dashboard host
# 2. Powerwall SOC sensor entity ID  — match your HA Tesla Fleet integration
# 3. Allow-grid-charging switch entity ID — match your HA Tesla Fleet integration
#
# Find your Powerwall entity IDs: HA → Developer Tools → States → search "powerwall"
# Common defaults shown below; replace if yours differ.

rest:
  - resource: http://localhost:8400/api/battery/recommended-cap   # ← EDIT: your dashboard host:port
    scan_interval: 3600                                            # poll hourly
    sensor:
      - name: "Recommended Grid Charge Cap"
        unique_id: recommended_grid_charge_cap
        value_template: "{{ value_json.recommended_cap }}"
        unit_of_measurement: "%"
        json_attributes:
          - solar_prediction
          - solar_to_battery_kwh
          - reasoning

automation:
  - id: grid_charge_cap_enforce
    alias: Grid Charge Cap (Weather-Predictive)
    description: >
      Stops grid charging when Powerwall SOC reaches the dashboard's
      recommended cap. The cap is computed daily from tomorrow's solar
      forecast — leaves room for solar to fill the battery rather than
      pre-charging from grid past the optimal point.
    triggers:
      - trigger: template
        value_template: >
          {% set soc = states("sensor.solar_power_plant_percentage_charged") | float(0) %}
          {% set cap = states("sensor.recommended_grid_charge_cap") | float(80) %}
          {{ soc > cap }}
    conditions:
      - condition: state
        entity_id: switch.solar_power_plant_allow_charging_from_grid   # ← EDIT
        state: "on"
    actions:
      - action: switch.turn_off
        target:
          entity_id: switch.solar_power_plant_allow_charging_from_grid  # ← EDIT
    mode: single
